# ─────────────────────────────────────────────
#  Configuración del microservicio Check-in
# ─────────────────────────────────────────────
#  Cualquier valor puede sobrescribirse con una
#  variable de entorno (sintaxis: ${?NOMBRE}).
# ─────────────────────────────────────────────

checkin {

  http {
    # Puerto donde queda escuchando el endpoint REST
    port = 8081
    port = ${?HTTP_PORT}
  }

  kafka {
    # Host del broker. Ejemplos:
    #   - Local:                        localhost:9092
    #   - Docker Compose del equipo:    kafka:29092
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP}

    # Tópico para los eventos PASAJERO_REGISTRADO
    topic = "registro.pasajero"
    topic = ${?KAFKA_TOPIC}

    # acks=all → espera confirmación de todas las réplicas
    acks = "all"
  }

  db {
    # URL JDBC de Postgres.
    #   - Local:                        jdbc:postgresql://localhost:5432/checkin_db
    #   - Docker (entre contenedores):  jdbc:postgresql://postgres:5432/checkin_db
    url = "jdbc:postgresql://localhost:5432/checkin_db"
    url = ${?DB_URL}

    user = "checkin"
    user = ${?DB_USER}

    password = "checkin123"
    password = ${?DB_PASSWORD}

    driver = "org.postgresql.Driver"

    # Tamaño del pool de conexiones HikariCP
    pool-size = 10
    pool-size = ${?DB_POOL_SIZE}
  }
}