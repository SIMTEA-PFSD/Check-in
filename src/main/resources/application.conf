# ─────────────────────────────────────────────
#  Configuración del microservicio Check-in
# ─────────────────────────────────────────────

checkin {
  kafka {
    # Host del broker. En Docker Compose del equipo será "kafka:9092".
    # Localmente se sobrescribe con la variable KAFKA_BOOTSTRAP.
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP}

    # Tópico donde publicamos los eventos PASAJERO_REGISTRADO
    topic = "registro.pasajero"

    # acks=all → espera confirmación de todas las réplicas (máxima seguridad)
    acks = "all"
  }
}